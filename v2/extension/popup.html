<!DOCTYPE html>
<html>
  <head>
    <title>EmailCopilot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>EmailCopilot</h1>

    <label for="emailBody">Email text</label>
    <textarea id="emailBody" placeholder="Paste the email you want to reply to..."></textarea>

    <button id="generateButton">Generate reply</button>

    <p id="status"></p>

    <label for="draftReply">Draft reply</label>
    <textarea id="draftReply" readonly></textarea>
    <button id="copyButton">Copy draft</button>
    <div id="metadata"></div>

    <script src="popup.js"></script>
  </body>
</html>
